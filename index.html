<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Disparos WhatsApp</title>

    <!-- Bibliotecas Necessárias carregadas diretamente da internet -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Leitor de CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Leitor de Excel (.xlsx) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Ícones Desenhados Manualmente ---
        const Icon = ({ path, className = "", size = 24, spin = false }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} ${spin ? 'animate-spin' : ''}`}>
                {path}
            </svg>
        );

        const Icons = {
            UploadCloud: (p) => <Icon {...p} path={<><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></>} />,
            MessageCircle: (p) => <Icon {...p} path={<><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></>} />,
            CheckCheck: (p) => <Icon {...p} path={<><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></>} />,
            MessageSquareReply: (p) => <Icon {...p} path={<><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="m10 7-3 3 3 3"/><path d="M7 10h7a2 2 0 0 1 2 2v1"/></>} />,
            CalendarDays: (p) => <Icon {...p} path={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></>} />,
            Megaphone: (p) => <Icon {...p} path={<><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></>} />,
            Smartphone: (p) => <Icon {...p} path={<><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></>} />,
            Info: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>} />,
            Loader2: (p) => <Icon {...p} spin path={<><path d="M21 12a9 9 0 1 1-6.219-8.56"/></>} />,
            AlertCircle: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>} />,
            XCircle: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></>} />,
            Filter: (p) => <Icon {...p} path={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>} />,
            Users: (p) => <Icon {...p} path={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
            BarChartHorizontal: (p) => <Icon {...p} path={<><path d="M3 3v18h18"/><path d="M7 16h8"/><path d="M7 11h12"/><path d="M7 6h3"/></>} />,
            ChevronDown: (p) => <Icon {...p} path={<><path d="m6 9 6 6 6-6"/></>} />,
            Search: (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />
        };

        // --- Dados de Amostra ---
        const mockData = [
          { "Campaign": "Captação Vestibular", "Sector": "Comercial", "Sent": "true", "Read": "Yes", "Send date": "Tue Apr 07 2026 09:56:07", "Template": "convite_inscricao_med", "Answer": "Até quando posso pagar?", "Contact number": "5571933331111", "Contact Email": "candidato1@email.com", "Message": "Olá, as inscrições estão abertas!", "Error Status": "NA" },
          { "Campaign": "Captação Vestibular", "Sector": "Comercial", "Sent": "false", "Read": "No", "Send date": "Tue Apr 07 2026 10:05:00", "Template": "convite_inscricao_med", "Answer": "-", "Contact number": "5571900000000", "Contact Email": "erro@email.com", "Message": "Olá, as inscrições estão abertas!", "Error Status": "Invalid Number" },
          { "Campaign": "Captação Vestibular", "Sector": "Comercial", "Sent": "true", "Read": "Yes", "Send date": "Fri Apr 24 2026 13:30:00", "Template": "lembrete_prova_medicina", "Answer": "Onde vejo o meu ensalamento?", "Contact number": "5571933332222", "Contact Email": "candidato2@email.com", "Message": "Lembrete: sua prova é amanhã.", "Error Status": "NA" },
          { "Campaign": "Captação Vestibular", "Sector": "Comercial", "Sent": "true", "Read": "Yes", "Send date": "Fri Apr 24 2026 13:35:00", "Template": "lembrete_prova_medicina", "Answer": "Obrigado!", "Contact number": "5571933334444", "Contact Email": "candidato3@email.com", "Message": "Lembrete: sua prova é amanhã.", "Error Status": "-" },
          { "Campaign": "Resultados Medicina", "Sector": "Comercial", "Sent": "true", "Read": "Yes", "Send date": "Mon Apr 27 2026 10:00:00", "Template": "aviso_aprovado_med", "Answer": "Passeiiii!!!", "Contact number": "5571933335555", "Contact Email": "candidato4@email.com", "Message": "Parabéns, você foi aprovado!", "Error Status": "NA" },
          { "Campaign": "Matrículas Abertas", "Sector": "Comercial", "Sent": "true", "Read": "Yes", "Send date": "Wed Apr 29 2026 14:00:00", "Template": "convite_matricula_aprovados", "Answer": "Quais os documentos necessários para a matrícula?", "Contact number": "5571977776666", "Contact Email": "candidato5@email.com", "Message": "Acesse o portal para realizar sua matrícula.", "Error Status": "NA" }
        ];

        function App() {
          const [data, setData] = useState(mockData);
          const [fileName, setFileName] = useState("Amostra de Dados");
          const [isDragging, setIsDragging] = useState(false);
          const [isLoading, setIsLoading] = useState(false);
          const [isDemo, setIsDemo] = useState(true);
          const [libsLoaded, setLibsLoaded] = useState(false);

          // Estados dos Filtros
          const [selectedCampaigns, setSelectedCampaigns] = useState([]);
          const [selectedTemplates, setSelectedTemplates] = useState([]);
          const [selectedSectors, setSelectedSectors] = useState([]);
          const [selectedDates, setSelectedDates] = useState([]);

          // Verifica se ambas as bibliotecas externas carregaram
          useEffect(() => {
            const checkLibs = setInterval(() => {
              if (window.Papa && window.XLSX) {
                setLibsLoaded(true);
                clearInterval(checkLibs);
              }
            }, 500);
            return () => clearInterval(checkLibs);
          }, []);

          // Processamento Inteligente de Múltiplos Arquivos (CSV e Excel)
          const handleFileUpload = async (event) => {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            if (!window.Papa || !window.XLSX) {
              alert("As bibliotecas de processamento ainda estão carregando. Aguarde um segundo.");
              return;
            }

            setIsLoading(true);
            setFileName(files.length > 1 ? `${files.length} arquivos processados` : files[0].name);
            
            try {
              const allDataPromises = files.map(file => {
                return new Promise((resolve, reject) => {
                  const extension = file.name.split('.').pop().toLowerCase();

                  if (extension === 'csv') {
                    window.Papa.parse(file, {
                      header: true,
                      skipEmptyLines: true,
                      complete: (results) => resolve(results.data),
                      error: (err) => reject(err)
                    });
                  } else if (extension === 'xlsx' || extension === 'xls') {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                      try {
                        const dataBuffer = new Uint8Array(e.target.result);
                        const workbook = window.XLSX.read(dataBuffer, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = window.XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                        resolve(json);
                      } catch (err) {
                        reject(err);
                      }
                    };
                    reader.onerror = (err) => reject(err);
                    reader.readAsArrayBuffer(file);
                  } else {
                    resolve([]);
                  }
                });
              });

              const resultsArrays = await Promise.all(allDataPromises);
              const combinedData = resultsArrays.flat();

              const validData = combinedData.filter(row => row['Send date'] || row['Template']);
              
              if (validData.length === 0) {
                  alert("Não foi possível encontrar dados válidos nestes arquivos.");
                  setIsLoading(false);
                  return;
              }

              setData(validData);
              setIsDemo(false);
              handleClearFilters();
            } catch (error) {
              console.error(error);
              alert("Ocorreu um erro ao processar os dados. Verifique o formato do arquivo.");
            } finally {
              setIsLoading(false);
              event.target.value = '';
            }
          };

          const getSortableDate = (dateStr) => {
            if (!dateStr) return null;
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return null;
            return d.toISOString().split('T')[0];
          };

          const formatDateToDisplay = (isoDate) => {
            if (!isoDate) return 'Desconhecido';
            const parts = isoDate.split('-');
            if (parts.length === 3) return `${parts[2]}/${parts[1]}`;
            return isoDate;
          };

          const filterOptions = useMemo(() => {
            const campaigns = new Set();
            const templates = new Set();
            const sectors = new Set();
            const dates = new Set();

            data.forEach(row => {
              campaigns.add(row['Campaign'] === 'NA' || !row['Campaign'] ? 'Sem Campanha' : row['Campaign']);
              templates.add(row['Template'] || 'Desconhecido');
              sectors.add(row['Sector'] === 'NA' || !row['Sector'] ? 'Sem Setor' : row['Sector']);
              
              const isoDate = getSortableDate(row['Send date']);
              if (isoDate) dates.add(isoDate);
            });

            return {
              campaigns: Array.from(campaigns).sort(),
              templates: Array.from(templates).sort(),
              sectors: Array.from(sectors).sort(),
              dates: Array.from(dates).sort().map(iso => ({ val: iso, label: formatDateToDisplay(iso) }))
            };
          }, [data]);

          const filteredData = useMemo(() => {
            return data.filter(row => {
              const camp = row['Campaign'] === 'NA' || !row['Campaign'] ? 'Sem Campanha' : row['Campaign'];
              const tpl = row['Template'] || 'Desconhecido';
              const sec = row['Sector'] === 'NA' || !row['Sector'] ? 'Sem Setor' : row['Sector'];
              const isoDate = getSortableDate(row['Send date']);

              if (selectedCampaigns.length > 0 && !selectedCampaigns.includes(camp)) return false;
              if (selectedTemplates.length > 0 && !selectedTemplates.includes(tpl)) return false;
              if (selectedSectors.length > 0 && !selectedSectors.includes(sec)) return false;
              if (selectedDates.length > 0 && !selectedDates.includes(isoDate)) return false;

              return true;
            });
          }, [data, selectedCampaigns, selectedTemplates, selectedSectors, selectedDates]);

          const metrics = useMemo(() => {
            if (!filteredData || filteredData.length === 0) return null;

            let totalSent = 0;
            let totalRead = 0;
            let totalAnswered = 0;
            let totalErrors = 0;
            
            const campaignCount = {};
            const templateCount = {};
            const dateCount = {};
            const recentAnswers = [];

            filteredData.forEach(row => {
              const sentVal = row['Sent']?.toString().toLowerCase();
              const isSent = sentVal === 'true' || sentVal === 'yes' || sentVal === 'sim';
              
              const errorStatus = row['Error Status'];
              const hasErrorText = errorStatus && errorStatus !== 'NA' && errorStatus !== '-' && errorStatus.trim() !== '';

              // Se não foi enviado (Sent: false) ou se tem uma mensagem de erro na coluna, é uma Falha
              if (!isSent || hasErrorText) {
                totalErrors++;
                return; // Pula a contagem de sucesso, leitura e funil para este contato
              }

              // Se passou pela validação de erro, foi Enviado com Sucesso
              totalSent++;

              const readVal = row['Read']?.toString().toLowerCase();
              if (readVal === 'yes' || readVal === 'sim') totalRead++;

              const answer = row['Answer'];
              const hasAnswer = answer && answer !== 'NA' && answer !== '-' && answer.trim() !== '';
              if (hasAnswer) {
                totalAnswered++;
                if (recentAnswers.length < 30) {
                  recentAnswers.push({
                    date: row['Send date'] ? row['Send date'].substring(0, 15) : 'Data Indisponível',
                    campaign: row['Campaign'] === 'NA' || !row['Campaign'] ? 'Sem Campanha' : row['Campaign'],
                    template: row['Template'] || 'Desconhecido',
                    text: answer,
                    number: row['Contact number']
                  });
                }
              }

              const camp = row['Campaign'] === 'NA' || !row['Campaign'] ? 'Sem Campanha' : row['Campaign'];
              campaignCount[camp] = (campaignCount[camp] || 0) + 1;

              const tpl = row['Template'] || 'Desconhecido';
              templateCount[tpl] = (templateCount[tpl] || 0) + 1;

              const isoDate = getSortableDate(row['Send date']);
              if (isoDate) {
                dateCount[isoDate] = (dateCount[isoDate] || 0) + 1;
              }
            });

            const topCampaigns = Object.entries(campaignCount).sort((a, b) => b[1] - a[1]);
            const topTemplates = Object.entries(templateCount).sort((a, b) => b[1] - a[1]);
            
            let timeline = [];
            const isoDates = Object.keys(dateCount);
            if (isoDates.length > 0) {
              const timestamps = isoDates.map(d => {
                const parts = d.split('-');
                return Date.UTC(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
              });
              const minTime = Math.min(...timestamps);
              const maxTime = Math.max(...timestamps);
              const daysDiff = (maxTime - minTime) / (1000 * 60 * 60 * 24);

              if (daysDiff > 0 && daysDiff <= 90) { 
                for (let t = minTime; t <= maxTime; t += 1000 * 60 * 60 * 24) {
                  const iso = new Date(t).toISOString().split('T')[0];
                  timeline.push([iso, dateCount[iso] || 0]);
                }
              } else {
                timeline = Object.entries(dateCount).sort((a, b) => a[0].localeCompare(b[0]));
              }
            }
            
            recentAnswers.reverse();

            const totalAttempts = totalSent + totalErrors;
            const errorRateNum = totalAttempts > 0 ? (totalErrors / totalAttempts) * 100 : 0;
            const readRateNum = totalSent > 0 ? (totalRead / totalSent) * 100 : 0;
            const answerRateNum = totalSent > 0 ? (totalAnswered / totalSent) * 100 : 0;

            return {
              totalRows: filteredData.length,
              totalSent,
              totalErrors,
              totalRead,
              totalAnswered,
              errorRate: errorRateNum.toFixed(1),
              readRate: readRateNum.toFixed(1),
              answerRate: answerRateNum.toFixed(1),
              topCampaigns: topCampaigns.slice(0, 5),
              topTemplates: topTemplates.slice(0, 5),
              timeline,
              recentAnswers
            };
          }, [filteredData]);

          const handleClearFilters = () => {
            setSelectedCampaigns([]);
            setSelectedTemplates([]);
            setSelectedSectors([]);
            setSelectedDates([]);
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8">
              <div className="max-w-7xl mx-auto mb-8">
                
                {isDemo && (
                  <div className="mb-6 bg-blue-50 border border-blue-200 text-blue-800 p-4 rounded-xl flex items-start gap-3">
                    <Icons.Info size={20} className="text-blue-500 shrink-0 mt-0.5" />
                    <div>
                      <h4 className="font-semibold text-sm">Visualizando dados de demonstração (Medicina)</h4>
                      <p className="text-sm mt-1">Arraste ou clique no botão à direita para subir uma ou várias planilhas (.csv ou .xlsx) e ver seus dados reais.</p>
                    </div>
                  </div>
                )}

                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                  <div>
                    <h1 className="text-3xl font-bold text-slate-900 flex items-center gap-2">
                      <Icons.MessageCircle size={32} className="text-emerald-500" />
                      Captação & Disparos WhatsApp
                    </h1>
                    <p className="text-slate-500 mt-1">Métricas de relacionamento com candidatos</p>
                  </div>
                  
                  <div className="relative">
                    <input 
                      type="file" 
                      accept=".csv, .xlsx, .xls" 
                      multiple
                      onChange={handleFileUpload}
                      disabled={!libsLoaded || isLoading}
                      className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10 disabled:cursor-not-allowed"
                      title="Carregue planilhas CSV ou Excel"
                    />
                    <div className={`flex items-center gap-3 px-4 py-3 rounded-xl border-2 border-dashed transition-colors ${isLoading || !libsLoaded ? 'opacity-70 bg-slate-50 cursor-not-allowed' : ''} ${isDragging ? 'border-emerald-500 bg-emerald-50' : 'border-slate-300 bg-white hover:border-emerald-400'}`}>
                      <div className={`${isLoading ? 'bg-slate-200 text-slate-500' : 'bg-emerald-100 text-emerald-600'} p-2 rounded-lg`}>
                         {isLoading ? <Icons.Loader2 size={20} spin /> : <Icons.UploadCloud size={20} />}
                      </div>
                      <div className="flex flex-col text-left">
                        <span className="text-sm font-medium text-slate-700">
                          {isLoading ? 'Lendo arquivos...' : (!libsLoaded ? 'Preparando...' : 'Carregar Arquivos (.csv, .xlsx)')}
                        </span>
                        <span className="text-xs text-slate-400 truncate max-w-[200px]">{fileName}</span>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6">
                  <div className="flex justify-between items-center mb-4">
                    <div className="flex items-center gap-2">
                      <Icons.Filter size={18} className="text-slate-400" />
                      <h2 className="text-sm font-semibold text-slate-700 uppercase tracking-wide">Filtros Avançados</h2>
                    </div>
                    {(selectedCampaigns.length > 0 || selectedTemplates.length > 0 || selectedSectors.length > 0 || selectedDates.length > 0) && (
                      <button onClick={handleClearFilters} className="text-xs font-medium text-emerald-600 hover:text-emerald-700 bg-emerald-50 px-3 py-1.5 rounded-lg transition-colors">
                        Limpar Todos
                      </button>
                    )}
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <MultiSelect label="Setores" options={filterOptions.sectors} selected={selectedSectors} onChange={setSelectedSectors} placeholder="Todos os setores" />
                    <MultiSelect label="Campanhas" options={filterOptions.campaigns} selected={selectedCampaigns} onChange={setSelectedCampaigns} placeholder="Todas as campanhas" />
                    <MultiSelect label="Templates" options={filterOptions.templates} selected={selectedTemplates} onChange={setSelectedTemplates} placeholder="Todos os templates" />
                    <MultiSelect label="Datas de Envio" options={filterOptions.dates} selected={selectedDates} onChange={setSelectedDates} placeholder="Todo o período" />
                  </div>
                </div>

                {!metrics || metrics.totalRows === 0 ? (
                  <div className="bg-white p-12 rounded-2xl shadow-sm border border-slate-100 text-center">
                    <Icons.AlertCircle size={48} className="mx-auto text-slate-300 mb-3" />
                    <h3 className="text-lg font-medium text-slate-700">Nenhum dado encontrado</h3>
                    <p className="text-slate-500 mt-1">A combinação de filtros selecionada não retornou nenhum disparo.</p>
                    <button onClick={handleClearFilters} className="mt-6 px-5 py-2.5 bg-emerald-100 text-emerald-700 rounded-xl text-sm font-semibold hover:bg-emerald-200 transition-colors">
                      Limpar Filtros
                    </button>
                  </div>
                ) : (
                  <>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                      <StatCard title="Enviados (Sucesso)" value={metrics.totalSent.toLocaleString('pt-BR')} icon={<Icons.Smartphone className="text-blue-500" />} bgColor="bg-blue-50" subtitle="Com sucesso" />
                      <StatCard title="Falhas (Erros)" value={metrics.totalErrors.toLocaleString('pt-BR')} icon={<Icons.XCircle className="text-red-500" />} bgColor="bg-red-50" subtitle={`${metrics.errorRate}% de erro`} />
                      <StatCard title="Lidas" value={metrics.totalRead.toLocaleString('pt-BR')} icon={<Icons.CheckCheck className="text-emerald-500" />} bgColor="bg-emerald-50" subtitle={`${metrics.readRate}% do enviado`} />
                      <StatCard title="Respostas" value={metrics.totalAnswered.toLocaleString('pt-BR')} icon={<Icons.MessageSquareReply className="text-orange-500" />} bgColor="bg-orange-50" subtitle={`${metrics.answerRate}% de interação`} />
                      <StatCard title="Campanhas Ativas" value={metrics.topCampaigns.length} icon={<Icons.Megaphone className="text-purple-500" />} bgColor="bg-purple-50" subtitle="Nos filtros" />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-2">
                        <div className="flex items-center gap-2 mb-6">
                          <Icons.CalendarDays size={20} className="text-slate-400" />
                          <h2 className="text-lg font-semibold text-slate-800">Evolução de Disparos por Dia</h2>
                        </div>
                        <div className="w-full overflow-x-auto pb-4 custom-scrollbar">
                          <TimelineChart data={metrics.timeline} formatter={formatDateToDisplay} />
                        </div>
                      </div>

                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                         <h2 className="text-lg font-semibold text-slate-800 mb-2">Templates Mais Usados</h2>
                         <p className="text-xs text-slate-500 mb-6">Volume por tipo de mensagem</p>
                         <div className="space-y-4 flex-grow">
                          {metrics.topTemplates.map((tpl, index) => (
                            <div key={index} className="flex justify-between items-center border-b border-slate-50 pb-2 last:border-0">
                              <span className="text-sm text-slate-600 truncate pr-4 font-medium" title={tpl[0]}>
                                {tpl[0]}
                              </span>
                              <span className="text-xs font-bold bg-slate-100 px-2.5 py-1 rounded-md text-slate-600">
                                {tpl[1].toLocaleString('pt-BR')}
                              </span>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 lg:col-span-3">
                        <div className="flex items-center gap-2 mb-6">
                          <Icons.Users size={20} className="text-orange-400" />
                          <h2 className="text-lg font-semibold text-slate-800">Dúvidas e Respostas dos Candidatos</h2>
                        </div>
                        
                        {metrics.recentAnswers.length === 0 ? (
                          <div className="py-8 text-center text-slate-400 text-sm">
                            Nenhuma resposta dos candidatos nos filtros atuais.
                          </div>
                        ) : (
                          <div className="space-y-3 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                            {metrics.recentAnswers.map((resp, i) => (
                              <div key={i} className="p-4 bg-slate-50 rounded-xl border border-slate-100 hover:bg-slate-100 transition-colors">
                                <p className="text-slate-700 text-sm italic mb-2">"{resp.text}"</p>
                                <div className="flex flex-wrap gap-x-4 gap-y-1 mt-2 text-xs text-slate-500 items-center">
                                  <span className="font-medium text-slate-600">Template: {resp.template}</span>
                                  <span>•</span>
                                  <span>Campanha: {resp.campaign}</span>
                                  <span>•</span>
                                  <span>{resp.date}</span>
                                  <span>•</span>
                                  <span className="font-medium">Número: {resp.number}</span>
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          );
        }

        const MultiSelect = ({ label, options, selected, onChange, placeholder }) => {
          const [isOpen, setIsOpen] = useState(false);
          const [searchTerm, setSearchTerm] = useState("");

          useEffect(() => {
            if (!isOpen) setSearchTerm("");
          }, [isOpen]);

          const filteredOptions = useMemo(() => {
            if (!searchTerm) return options;
            const lowerSearch = searchTerm.toLowerCase();
            return options.filter(opt => {
              const display = typeof opt === 'object' ? opt.label : opt;
              return String(display).toLowerCase().includes(lowerSearch);
            });
          }, [options, searchTerm]);

          const toggleOption = (optionValue) => {
            if (selected.includes(optionValue)) {
              onChange(selected.filter(v => v !== optionValue));
            } else {
              onChange([...selected, optionValue]);
            }
          };

          const handleSelectAll = (e) => {
            if (e.target.checked) {
              const newSelected = [...selected];
              filteredOptions.forEach(opt => {
                  const val = typeof opt === 'object' ? opt.val : opt;
                  if (!newSelected.includes(val)) newSelected.push(val);
              });
              onChange(newSelected);
            } else {
              const filteredVals = filteredOptions.map(opt => typeof opt === 'object' ? opt.val : opt);
              onChange(selected.filter(v => !filteredVals.includes(v)));
            }
          };

          const allFilteredSelected = filteredOptions.length > 0 && filteredOptions.every(opt => {
            const val = typeof opt === 'object' ? opt.val : opt;
            return selected.includes(val);
          });

          const getDisplayText = () => {
            if (selected.length === 0) return placeholder;
            if (selected.length === 1) {
              const opt = options.find(o => (typeof o === 'object' ? o.val : o) === selected[0]);
              return typeof opt === 'object' ? opt.label : opt;
            }
            if (selected.length === options.length) return "Todos selecionados";
            return `${selected.length} selecionados`;
          };

          return (
            <div className={`flex flex-col gap-1 relative ${isOpen ? 'z-50' : ''}`}>
              <label className="text-xs font-medium text-slate-500 ml-1">{label}</label>
              
              <div 
                className="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg p-2.5 cursor-pointer flex justify-between items-center hover:bg-slate-100 transition-colors"
                onClick={() => setIsOpen(!isOpen)}
              >
                <span className="truncate pr-2 font-medium">{getDisplayText()}</span>
                <Icons.ChevronDown size={16} className={`text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}`} />
              </div>

              {isOpen && (
                <>
                  <div className="fixed inset-0 z-40" onClick={() => setIsOpen(false)}></div>
                  <div className="absolute top-full left-0 z-50 mt-1 w-full bg-white border border-slate-200 rounded-xl shadow-xl flex flex-col overflow-hidden">
                    
                    {/* Barra de Pesquisa Interna */}
                    <div className="p-2 border-b border-slate-100 bg-slate-50 z-20">
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none">
                          <Icons.Search size={14} className="text-slate-400" />
                        </div>
                        <input
                          type="text"
                          placeholder="Pesquisar..."
                          value={searchTerm}
                          onChange={(e) => setSearchTerm(e.target.value)}
                          className="w-full pl-8 pr-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all"
                        />
                      </div>
                    </div>

                    <div className="overflow-y-auto custom-scrollbar max-h-60">
                      <div className="p-3 border-b border-slate-100 sticky top-0 bg-white z-10">
                        <label className="flex items-center gap-2 text-sm cursor-pointer font-semibold text-emerald-600">
                          <input type="checkbox" checked={allFilteredSelected} onChange={handleSelectAll} className="rounded text-emerald-500 focus:ring-emerald-500 w-4 h-4 cursor-pointer" />
                          Selecionar Todos
                        </label>
                      </div>
                      <div className="p-1">
                        {filteredOptions.length === 0 ? (
                          <div className="p-3 text-center text-sm text-slate-400">Nenhum resultado.</div>
                        ) : (
                          filteredOptions.map((opt, i) => {
                            const val = typeof opt === 'object' ? opt.val : opt;
                            const display = typeof opt === 'object' ? opt.label : opt;
                            return (
                              <label key={i} className="flex items-center gap-2 p-2 hover:bg-slate-50 text-sm cursor-pointer text-slate-700 rounded-lg transition-colors">
                                <input type="checkbox" checked={selected.includes(val)} onChange={() => toggleOption(val)} className="rounded text-emerald-500 focus:ring-emerald-500 w-4 h-4 cursor-pointer" />
                                <span className="truncate" title={display}>{display}</span>
                              </label>
                            )
                          })
                        )}
                      </div>
                    </div>
                  </div>
                </>
              )}
            </div>
          );
        };

        const StatCard = ({ title, value, icon, bgColor, subtitle }) => (
          <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4 hover:shadow-md transition-shadow">
            <div className={`p-4 rounded-xl ${bgColor}`}>
              {icon}
            </div>
            <div>
              <p className="text-sm font-medium text-slate-500">{title}</p>
              <h3 className="text-2xl font-bold text-slate-800">{value}</h3>
              {subtitle && <p className="text-xs text-emerald-600 font-medium mt-1">{subtitle}</p>}
            </div>
          </div>
        );

        const TimelineChart = ({ data, formatter }) => {
          if (data.length === 0) return <div className="text-sm text-slate-400 py-8 text-center">Sem dados de data disponíveis.</div>;
          const maxVal = Math.max(...data.map(d => d[1]), 1); 

          return (
            <div className={`h-64 flex items-end pt-10 px-2 min-w-max w-full ${data.length < 10 ? 'justify-around' : 'justify-start gap-3 md:gap-4'}`}>
              {data.map((day, index) => {
                const heightPercentage = Math.max((day[1] / maxVal) * 100, 1);
                const isEmpty = day[1] === 0;
                
                return (
                  <div key={index} className="flex flex-col items-center flex-1 min-w-[32px] max-w-[50px] group h-full justify-end">
                    <div 
                      className={`w-full rounded-t-md transition-all duration-300 relative flex justify-center ${isEmpty ? 'bg-slate-100 cursor-default' : 'bg-blue-100 group-hover:bg-blue-200 cursor-pointer'}`}
                      style={{ height: isEmpty ? '2px' : `${heightPercentage}%`, minHeight: isEmpty ? '2px' : '4px' }}
                    >
                      {!isEmpty && (
                        <div className="absolute bottom-0 w-full bg-blue-500 rounded-t-md opacity-90 transition-colors group-hover:bg-blue-600" style={{ height: '100%' }}></div>
                      )}
                      
                      <div className="absolute -top-8 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-800 text-white text-[10px] sm:text-xs px-2 py-1 rounded pointer-events-none whitespace-nowrap z-20 shadow-md">
                        {day[1].toLocaleString('pt-BR')} msg
                      </div>
                    </div>
                    <span className={`text-[10px] sm:text-xs mt-3 font-medium truncate max-w-full ${isEmpty ? 'text-slate-300' : 'text-slate-500'}`}>
                      {formatter(day[0])}
                    </span>
                  </div>
                );
              })}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
